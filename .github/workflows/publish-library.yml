# Reusable library publisher - consumed by third-party content repos.
#
# A repo that follows the aitelier folder convention (prompts/*.md,
# skills/<slug>/SKILL.md or skills/*.md, agents/*.md, hooks/<slug>/hook.json
# + README.md, frontmatter `name` + `description`, optional aitelier.json
# sidecars) can publish its own browsable library with a ~10 line caller:
#
#   # .github/workflows/library.yml in the content repo
#   name: Publish library
#   on:
#     push: { branches: [main] }
#     workflow_dispatch:
#   permissions: { contents: read, pages: write, id-token: write }
#   jobs:
#     publish:
#       uses: noelruault/.aitelier/.github/workflows/publish-library.yml@main
#
# Modes:
#   pages (default) - deploys straight to the caller repo's GitHub Pages.
#     Requires Pages enabled with source = GitHub Actions in the caller repo.
#     WARNING: Pages from a private repo publishes a PUBLIC site unless the
#     org has GitHub Enterprise Cloud access-controlled Pages.
#   artifact - skips Pages entirely and uploads the built site as a normal
#     Actions artifact (default name `aitelier-site`). For content that must
#     live behind an internal / SAML-protected domain: a downstream pipeline
#     downloads the artifact and ships the static files to the internal host.
#     The site is hash-routed and relative-pathed, so it serves from any
#     origin or subpath with no server config beyond "serve static files".
#
# SUPPLY-CHAIN NOTE (read before adopting): this workflow checks out the app
# shell (and the auditor that runs over it) from `app-ref`, default `main` of
# noelruault/.aitelier. `main` is MUTABLE: a compromised upstream snapshot
# would execute in YOUR CI runner alongside your private content. Pin `app-ref`
# to a reviewed commit SHA - that freezes exactly what you reviewed and is the
# supply-chain control, not merely a reproducibility nicety. (The inline audit
# cannot save you here: a compromised shell can ship a neutered auditor. Pin
# first, then trust the badge on that SHA.) Third-party actions below are
# SHA-pinned and harden-runner records build egress so a trojan that phones
# home during your build is visible in the run.

name: Publish Library (Reusable)

on:
  workflow_call:
    inputs:
      mode:
        description: "pages | artifact"
        type: string
        default: "pages"
      app-repo:
        description: "Repo providing the aitelier app shell"
        type: string
        default: "noelruault/.aitelier"
      app-ref:
        description: "Ref of the app shell. PIN A COMMIT SHA: 'main' is mutable, so a compromised upstream would run in your CI. SHA = reviewed-and-frozen (supply-chain control)."
        type: string
        default: "main"
      artifact-name:
        description: "Artifact name when mode=artifact"
        type: string
        default: "aitelier-site"
      validate:
        description: "Fail the build when content breaks the entity conventions"
        type: boolean
        default: true

jobs:
  build:
    name: Build library site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # NOTE: no job-level `permissions` here. This is a reusable workflow; its
    # token is bounded by the caller's grant, and declaring pages:write would
    # make GitHub reject artifact-mode callers (who grant only contents:read)
    # at startup. The build job's compensating controls are the inline auditor
    # plus harden-runner egress recording below.
    steps:
      - name: Harden runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout content (caller repo)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: content
          persist-credentials: false

      - name: Checkout aitelier app shell
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ inputs.app-repo }}
          ref: ${{ inputs.app-ref }}
          path: app
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      # Replace, not merge: the shell's bundled demo content is dropped and
      # the caller's four entity folders become the library. A folder the
      # caller does not have publishes empty.
      - name: Overlay caller content into canonical paths
        run: |
          set -euo pipefail
          for sub in prompts skills agents hooks; do
            rm -rf "app/$sub"
            mkdir -p "app/$sub"
            if [ -d "content/$sub" ]; then
              rsync -a "content/$sub/" "app/$sub/"
            fi
          done

      # Trojan-horse grep checklist over the app shell AND the overlaid
      # content (a bidi trick inside a prompt is an attack on whoever
      # pastes it). Fails the build with file:line findings.
      - name: Audit shipped source
        working-directory: app
        run: bun run scripts/audit-source.ts

      - name: Validate entity conventions
        if: ${{ inputs.validate }}
        working-directory: app
        run: bun run scripts/validate-entities.ts

      - name: Build asset manifest
        working-directory: app
        run: bun run scripts/build-manifest.ts

      # Same exclusion list as the snapshot's own pages.yml: ship the site,
      # not the machinery.
      - name: Stage clean site root
        run: |
          set -euo pipefail
          mkdir -p _site
          rsync -a --delete \
            --exclude 'tests/' \
            --exclude 'scripts/' \
            --exclude 'package.json' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.plans/' \
            --exclude '.wrangler/' \
            --exclude 'worker/' \
            --exclude 'node_modules/' \
            --exclude 'demo/' \
            --exclude 'bun.lock' \
            --exclude 'Makefile' \
            --exclude '.assetsignore' \
            --exclude '.gitignore' \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            --exclude '**/.DS_Store' \
            app/ _site/
          test -f _site/index.html
          test -f _site/_manifest.json

      - name: Upload site artifact (internal deploy)
        if: ${{ inputs.mode == 'artifact' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-name }}
          path: _site
          if-no-files-found: error

      - name: Configure Pages
        if: ${{ inputs.mode == 'pages' }}
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        if: ${{ inputs.mode == 'pages' }}
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    if: ${{ inputs.mode == 'pages' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # No explicit permissions block: inherited from the caller's grant.
    # Declaring pages/id-token here makes GitHub reject the whole run at
    # startup for artifact-mode callers that only grant contents: read,
    # even though this job is skipped. Pages-mode callers must grant
    # pages: write + id-token: write (see header example).
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
